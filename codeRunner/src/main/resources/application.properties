micronaut.server.port=8081
micronaut.server.cors.enabled=true

# Demo launcher configuration. These paths are intentionally hardcoded so the
# presentation runs reliably without depending on the ambient environment.
demo.gradlew=/home/marco_sussitz/Documents/Development/techevengelist/HotSwapAgent/gradlew
demo.task=:runMain
demo.java-home=/home/marco_sussitz/.jdkman/jdks/temurin/21/OpenJDK21U-jdk_x64_linux_hotspot_21.0.9_10

# Serve the vendored xterm.js terminal assets (offline-capable).
micronaut.router.static-resources.static.paths=classpath:static
micronaut.router.static-resources.static.mapping=/static/**

# Live GDB debugging demo. Drives an interactive gdb session (over a PTY) against the
# locally built slowdebug JVM running the memoryLeakSample metaspace leak. Paths are
# intentionally hardcoded so the presentation runs reliably without ambient environment.
gdb.gdb-binary=/usr/bin/gdb
gdb.pty-wrapper=/usr/bin/script
gdb.java-binary=/home/marco_sussitz/Documents/Development/work_repos/jdk/build/linux-x86_64-server-slowdebug/images/jdk/bin/java
gdb.leak-sample-dir=/home/marco_sussitz/Documents/Development/techevengelist/HotSwapAgent/memoryLeakSample
gdb.agent-jar=/home/marco_sussitz/Documents/Development/techevengelist/HotSwapAgent/memoryLeakSample/build/agent.jar
gdb.swaps-dir=/home/marco_sussitz/Documents/Development/techevengelist/HotSwapAgent/memoryLeakSample/swaps
gdb.initial-classpath=/home/marco_sussitz/Documents/Development/techevengelist/HotSwapAgent/memoryLeakSample/swaps/00000
gdb.main-class=demo.Leaker
gdb.duration-ms=600000
gdb.num-versions=200
gdb.print-every=100000
gdb.target-metaspace-mb=0
gdb.term-cols=90
gdb.term-rows=26
