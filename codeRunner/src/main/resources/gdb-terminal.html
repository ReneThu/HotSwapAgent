<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>gdb — slowdebug jvm</title>
  <link rel="stylesheet" href="/static/xterm.css" />
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      width: 100%;
      background: #1e1e2e;
      overflow: hidden;
    }
    /* The terminal fills the whole page (which fills the whole slide via the iframe). No window
       chrome, no title bar, no controls — just a full-screen terminal. */
    #terminal {
      position: absolute;
      inset: 0;
      padding: 10px 14px;
      background: #1e1e2e;
    }
    .xterm { height: 100%; }
    .xterm .xterm-viewport { background: transparent !important; }
  </style>
</head>
<body>
  <div id="terminal"></div>

  <script src="/static/xterm.js"></script>
  <script src="/static/xterm-addon-fit.js"></script>
  <script>
    // Geometry is pinned to match the PTY (gdb.term-cols / gdb.term-rows in application.properties).
    // Keeping both sides at exactly the same size is what lets gdb's full-screen TUI (`layout src`)
    // line up cleanly — the font is scaled so this fixed grid fills the window as large as possible.
    const GRID_COLS = 90, GRID_ROWS = 26;
    const term = new Terminal({
      cols: GRID_COLS,
      rows: GRID_ROWS,
      cursorBlink: true,
      fontFamily: 'ui-monospace, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace',
      fontSize: 18,
      lineHeight: 1.15,
      scrollback: 8000,
      theme: {
        background: '#1e1e2e',
        foreground: '#cdd6f4',
        cursor: '#f5e0dc',
        cursorAccent: '#1e1e2e',
        selectionBackground: '#585b70',
        black: '#45475a', red: '#f38ba8', green: '#a6e3a1', yellow: '#f9e2af',
        blue: '#89b4fa', magenta: '#f5c2e7', cyan: '#94e2d5', white: '#bac2de',
        brightBlack: '#585b70', brightRed: '#f38ba8', brightGreen: '#a6e3a1', brightYellow: '#f9e2af',
        brightBlue: '#89b4fa', brightMagenta: '#f5c2e7', brightCyan: '#94e2d5', brightWhite: '#a6adc8',
      },
    });
    const fitAddon = new FitAddon.FitAddon();
    term.loadAddon(fitAddon);
    term.open(document.getElementById('terminal'));

    // Scale the font so the fixed GRID_COLS x GRID_ROWS grid fills the container, then lock the
    // grid back to that size. proposeDimensions() reports how many cells fit at the current font,
    // so proposed/target is the factor to scale the font by; a few passes converge.
    function fitFontToGrid() {
      for (let i = 0; i < 4; i++) {
        const prop = fitAddon.proposeDimensions();
        if (!prop || !prop.cols || !prop.rows) break;
        const scale = Math.min(prop.cols / GRID_COLS, prop.rows / GRID_ROWS);
        const next = Math.max(8, Math.min(48, Math.floor(term.options.fontSize * scale)));
        if (next === term.options.fontSize) break;
        term.options.fontSize = next;
      }
      term.resize(GRID_COLS, GRID_ROWS);
    }

    fitFontToGrid();
    term.focus();
    window.addEventListener('resize', () => { try { fitFontToGrid(); } catch {} });

    let ws = null;
    function connect() {
      if (ws) return;
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      ws = new WebSocket(`${proto}://${location.host}/gdb/ws`);
      ws.binaryType = 'arraybuffer';
      ws.onmessage = (evt) => {
        term.write(evt.data instanceof ArrayBuffer ? new Uint8Array(evt.data) : evt.data);
      };
      ws.onclose = () => {
        ws = null;
        term.write('\r\n\x1b[90m[session ended]\x1b[0m\r\n');
      };
    }

    // Presenter keystrokes → PTY (the PTY echoes them, so no local echo here).
    term.onData(data => {
      if (ws && ws.readyState === WebSocket.OPEN) ws.send(data);
    });

    // Mouse-wheel scrolling. This vendored xterm build doesn't wire the wheel to the scrollback
    // itself, so do it explicitly: in the normal buffer scroll the scrollback; in a full-screen app
    // (gdb's `layout src` TUI) translate the wheel into arrow keys so the source window scrolls.
    document.getElementById('terminal').addEventListener('wheel', (e) => {
      const buf = term.buffer.active;
      if (buf && buf.type === 'alternate') {
        const seq = e.deltaY > 0 ? '\x1b[B' : '\x1b[A';
        if (ws && ws.readyState === WebSocket.OPEN) ws.send(seq.repeat(3));
      } else {
        term.scrollLines(e.deltaY > 0 ? 3 : -3);
      }
      e.preventDefault();
    }, { passive: false });

    // The terminal is just there, live — start the session automatically.
    connect();
  </script>
</body>
</html>
