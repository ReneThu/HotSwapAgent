<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">
<head>
    <title>Decompiled code</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #333;
            font-size: 12px;
        }
        textarea {
            width: 100%;
            height: 400px;
            background-color: #f2f2f2;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            font-family: monospace;
            white-space: pre;
            overflow-x: auto;
        }
        button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        .button-container {
            display: flex;
            gap: 10px;
        }
        .back-button {
            background-color: #f44336;
        }
        .back-button:hover {
            background-color: #e53935;
        }
    </style>
    <script>
        function runCode(className) {
            const code = document.getElementById('codeArea').value;
            fetch(`../hot-swap/${className}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ code: code })
            })
            .then(response => {
                if (response.ok) {
                    location.reload();
                } else {
                    alert('Error executing code');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Error executing code');
            });
        }

        function goBack() {
            window.history.back();
        }
    </script>
</head>
<body>
<h1 th:text="${codeElement.className}"></h1>
<textarea id="codeArea" th:text="${codeElement.decompiledCode}"></textarea>
<div class="button-container">
    <button th:onclick="runCode([[${codeElement.className}]])">Update</button>
    <button class="back-button" onclick="goBack()">Back</button>
</div>
<script>
    // Mirror this page across every slide window (presenter + audience). Report where the iframe
    // navigated by telling our own parent (DemoIframe.vue); the parent records our current path,
    // knows not to reload us, and publishes it to the shared backend so the other window follows.
    (function () {
        var path = location.pathname;
        try { if (window.parent && window.parent !== window) window.parent.postMessage({ demoPath: path }, '*'); } catch (e) {}
    })();
</script>
<script>
    // Live-mirror the code editor across every slide window (presenter + audience). Cross-origin to
    // the deck, so we relay through the shared backend: publish this window's edits, and poll for the
    // other window's edits — applying them only when this textarea is NOT the one being typed in, so
    // the presenter is never overwritten mid-keystroke.
    (function () {
        var CODE_API = 'http://localhost:8081/demo/code';
        var POLL_MS = 400;
        var DEBOUNCE_MS = 150;
        var textarea = document.getElementById('codeArea');
        if (!textarea) return;
        var debounceId = null;

        function publish() {
            var value = textarea.value;
            if (!value) return;
            try {
                fetch(CODE_API, { method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: value });
            } catch (e) {}
        }

        textarea.addEventListener('input', function () {
            if (debounceId) clearTimeout(debounceId);
            debounceId = setTimeout(publish, DEBOUNCE_MS);
        });

        setInterval(function () {
            // Never overwrite the window whose textarea is being edited.
            if (document.activeElement === textarea) return;
            fetch(CODE_API)
                .then(function (r) { return r.text(); })
                .then(function (remote) {
                    // Non-empty guard: a cleared buffer (fresh page / new run) must not blank a window;
                    // it just means "no shared edit yet", so keep the server's decompiled code.
                    if (remote && remote !== textarea.value) textarea.value = remote;
                })
                .catch(function () {});
        }, POLL_MS);
    })();
</script>
<script>
    // Forward the mouse position (normalized to this iframe's viewport) to the parent slide so the
    // presenter's mirrored cursor stays visible while hovering/interacting with the iframe — the deck
    // can't see mousemove inside a cross-origin iframe, so the presenter cursor would otherwise vanish.
    (function () {
        var lastTs = 0;
        window.addEventListener('mousemove', function (ev) {
            var now = Date.now();
            if (now - lastTs < 30) return;
            lastTs = now;
            var nx = ev.clientX / window.innerWidth;
            var ny = ev.clientY / window.innerHeight;
            try { if (window.parent && window.parent !== window) window.parent.postMessage({ demoCursor: { nx: nx, ny: ny } }, '*'); } catch (e) {}
        }, { passive: true });
    })();
</script>
<script>
    // Mirror scroll position across every slide window (presenter + audience) through the shared
    // backend, since the deck cannot scroll a cross-origin iframe. Publish our own scrolling and poll
    // for the other window's; an applyingRemote/lastSent guard prevents a feedback loop.
    (function () {
        var SCROLL_API = 'http://localhost:8081/demo/scroll';
        var PUBLISH_MS = 80;
        var POLL_MS = 150;
        var textarea = document.getElementById('codeArea');
        var applyingRemote = false;
        var lastSent = '';
        var pubTimer = null;

        function scroller() { return document.scrollingElement || document.documentElement; }

        function snapshot() {
            var w = scroller();
            return JSON.stringify({
                wx: w.scrollLeft, wy: w.scrollTop,
                tx: textarea ? textarea.scrollLeft : 0,
                ty: textarea ? textarea.scrollTop : 0
            });
        }

        function publish() {
            var s = snapshot();
            if (s === lastSent) return;
            lastSent = s;
            try { fetch(SCROLL_API, { method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: s }); } catch (e) {}
        }

        // capture=true so scroll events from inner elements (the textarea) reach this listener too.
        window.addEventListener('scroll', function () {
            if (applyingRemote || pubTimer) return;
            pubTimer = setTimeout(function () { pubTimer = null; publish(); }, PUBLISH_MS);
        }, true);

        setInterval(function () {
            fetch(SCROLL_API).then(function (r) { return r.text(); }).then(function (txt) {
                if (!txt || txt === lastSent) return;
                var s; try { s = JSON.parse(txt); } catch (e) { return; }
                applyingRemote = true;
                try {
                    var w = scroller();
                    if (typeof s.wy === 'number') { w.scrollTop = s.wy; w.scrollLeft = s.wx || 0; }
                    if (textarea && typeof s.ty === 'number') { textarea.scrollTop = s.ty; textarea.scrollLeft = s.tx || 0; }
                } catch (e) {}
                lastSent = txt;
                setTimeout(function () { applyingRemote = false; }, 0);
            }).catch(function () {});
        }, POLL_MS);
    })();
</script>
</body>
</html>
